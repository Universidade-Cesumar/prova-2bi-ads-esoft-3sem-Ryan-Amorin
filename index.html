<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Almoxarifado</title>
    <link rel='stylesheet' href='main.css'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <header>
        <h1>Almoxarifado</h1>
    </header>

    <main>
        <h2>Cadastrar Item</h2>

        <div>
    <div id="produto">
        <label for="input-nome">Nome do produto</label>
        <input id="input-nome" type="text">
    </div>
    <div id="quantidade">
        <label for="input-quantidade">Quantidade</label>
        <input id="input-quantidade" type="number">
    </div>
    </div>

    <button id="btn-cadastrar" onclick="cadastrarProduto()">Cadastrar</button>

    
    
    <div id="baixa-estoque">
        <label for="input-retirada">Quantidade a retirar</label>
        <input id="input-retirada" type="number">
    </div>
    
    <table id="lista-materiais">
        <thead>
            <tr>
                <th>Id</th>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="corpo-tabela">
        </tbody>
    </table>
</main>

    <div id="buscar">
        <label for="input-busca">Buscar produto</label>
        <input id="input-busca" type="text">
    </div>

    <div id="total-itens">
        <div class="estoque-critico">
            <h3>Estoque Crítico</h3>

            <table id="lista-materiais">
                <thead>
                 <tr>
                    <th>Id</th>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Ação</th>
                 </tr>
                </thead>
                <tbody id="corpo-tabela">
            </tbody>
            </table>
        </div>
    </div>

    <script src='main.js' defer></script>
</body>
</html>
